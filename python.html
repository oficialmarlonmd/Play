<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
<title>Cobrinha de Cristais - Mobile</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; }
  
  /* touch-action: none evita gestos nativos do Android (como puxar para atualizar ou zoom) */
  html, body { 
    width: 100%; height: 100%; 
    overflow: hidden; 
    background: #05060d; 
    font-family: 'Segoe UI', Arial, sans-serif; 
    color: #fff;
    touch-action: none; 
  }
  
  canvas { display: block; }
  
  #hud {
    position: fixed; top: 12px; left: 12px;
    background: rgba(10, 14, 30, 0.55); backdrop-filter: blur(6px);
    border: 1px solid rgba(120, 180, 255, 0.25);
    padding: 8px 12px; border-radius: 10px;
    font-size: 11px; line-height: 1.4;
    text-shadow: 0 0 8px rgba(120, 180, 255, 0.5);
    pointer-events: none; /* Não atrapalha o toque se passar por cima */
  }
  #hud b { color: #7ed7ff; }
  
  /* Esconde contadores pesados de debug em telas muito pequenas (opcional) */
  @media (max-width: 600px) {
    #hud .debug-info { display: none; }
  }

  #minimap {
    position: fixed; top: 12px; right: 12px;
    border: 1px solid rgba(120, 180, 255, 0.35);
    background: rgba(5, 8, 20, 0.55); backdrop-filter: blur(6px);
    border-radius: 8px;
    width: 100px; height: 100px; /* Reduzido para telas menores */
    pointer-events: none;
  }
  
  /* Botão de Dash Virtual para Mobile */
  #dashBtn {
    position: fixed;
    bottom: 24px;
    left: 24px;
    width: 70px;
    height: 70px;
    background: radial-gradient(circle, rgba(138, 92, 255, 0.7) 0%, rgba(74, 142, 255, 0.4) 100%);
    border: 2px solid rgba(120, 180, 255, 0.6);
    border-radius: 50%;
    box-shadow: 0 0 15px rgba(128, 90, 255, 0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    font-size: 14px;
    letter-spacing: 0.5px;
    text-shadow: 0 0 5px #fff;
    z-index: 5;
    touch-action: none;
  }
  #dashBtn:active {
    transform: scale(0.92);
    background: radial-gradient(circle, rgba(255, 107, 157, 0.8) 0%, rgba(138, 92, 255, 0.6) 100%);
    border-color: rgba(255, 155, 209, 0.8);
  }

  #overlay {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0, 0, 0, 0.8);
    z-index: 10;
    padding: 20px;
  }
  #overlay .panel {
    background: linear-gradient(135deg, rgba(20, 30, 60, 0.95), rgba(40, 20, 80, 0.95));
    border: 1px solid rgba(120, 180, 255, 0.4);
    border-radius: 18px;
    padding: 24px 32px;
    text-align: center;
    box-shadow: 0 0 40px rgba(80, 140, 255, 0.3);
    max-width: 400px;
    width: 100%;
  }
  #overlay h1 { font-size: 26px; margin-bottom: 12px; color: #9be8ff; text-shadow: 0 0 16px rgba(120, 200, 255, 0.6); }
  #overlay p { font-size: 13px; line-height: 1.6; margin-bottom: 18px; color: #c8d8f0; }
  #overlay button {
    background: linear-gradient(135deg, #4a8eff, #8a5cff);
    color: #fff; border: none; padding: 12px 32px;
    font-size: 16px; border-radius: 10px; cursor: pointer;
    font-weight: bold; letter-spacing: 0.5px;
  }
  
  .hidden { display: none !important; }
  
  .leaderboard {
    position: fixed; bottom: 12px; right: 12px;
    background: rgba(10, 14, 30, 0.55); backdrop-filter: blur(6px);
    border: 1px solid rgba(120, 180, 255, 0.25);
    padding: 8px 12px; border-radius: 10px;
    font-size: 11px; line-height: 1.5;
    min-width: 140px;
    pointer-events: none;
  }
  .leaderboard h3 { font-size: 11px; color: #7ed7ff; margin-bottom: 2px; letter-spacing: 1px; }
  .leaderboard .row { display: flex; justify-content: space-between; }
  .leaderboard .me { color: #ffe07a; font-weight: bold; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<canvas id="minimap" width="100" height="100"></canvas>

<div id="dashBtn">DASH</div>

<div id="hud">
  Tamanho: <b id="score">0</b><br>
  Cristais: <b id="eaten">0</b><br>
  Cobras: <b id="alive">0</b>
  <div class="debug-info">
    <hr style="border:0;border-top:1px solid rgba(120,180,255,0.2);margin:4px 0">
    FPS: <b id="fps">—</b><br>
    Heap JS: <b id="memory">—</b>
  </div>
</div>

<div class="leaderboard" id="leaderboard">
  <h3>RANKING</h3>
  <div id="leaderboardList"></div>
</div>

<div id="overlay">
  <div class="panel">
    <h1>Cobrinha de Cristais</h1>
    <p>
      <b>Controles Mobile:</b><br>
      Arraste o dedo na tela para guiar a cobra.<br>
      Segure o botão <b>DASH</b> para correr (gasta tamanho).<br><br>
      Corte o caminho das outras cobras para destruí-las!
    </p>
    <button id="startBtn">Começar</button>
  </div>
</div>

<script>
// ============================================================
// CONFIG
// ============================================================
const WORLD = 5000;
const CRYSTAL_COUNT = 350;      // Levemente reduzido para performance mobile
const AI_COUNT = 10;            // Levemente reduzido para evitar travamentos em celulares antigos
const SEG_SPACING = 8;
const HEAD_RADIUS = 12;
const BASE_SPEED = 2.4;
const DASH_SPEED = 4.4;
const TURN_RATE = 0.11;         // Curva ligeiramente mais rápida para melhorar a resposta no touch
const START_LENGTH = 20;

// ============================================================
// SETUP
// ============================================================
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const mini = document.getElementById('minimap');
const mctx = mini.getContext('2d');
const dashBtn = document.getElementById('dashBtn');

let W = 0, H = 0;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// ============================================================
// TOUCH / INPUT ADAPTADO PARA MOBILE
// ============================================================
const input = { mx: W/2, my: H/2, boost: false };

// Função unificada para tratar a posição do toque
function handleTouch(e) {
  if (e.touches.length > 0) {
    // Procura por um toque que NÃO seja em cima do botão de dash
    for (let i = 0; i < e.touches.length; i++) {
      const touch = e.touches[i];
      if (touch.target !== dashBtn) {
        input.mx = touch.clientX;
        input.my = touch.clientY;
        break;
      }
    }
  }
}

// Eventos de movimento na tela
window.addEventListener('touchstart', handleTouch, { passive: false });
window.addEventListener('touchmove', handleTouch, { passive: false });

// Eventos do Botão de Dash (Turbo) dedicado
dashBtn.addEventListener('touchstart', (e) => {
  e.preventDefault(); // Evita cliques fantasmas do mouse
  input.boost = true;
}, { passive: false });

dashBtn.addEventListener('touchend', (e) => {
  e.preventDefault();
  input.boost = false;
}, { passive: false });

// Mantém suporte a Mouse/Teclado (Caso teste no PC simulando mobile)
canvas.addEventListener('mousemove', e => { input.mx = e.clientX; input.my = e.clientY; });
canvas.addEventListener('mousedown', () => input.boost = true);
canvas.addEventListener('mouseup', () => input.boost = false);
window.addEventListener('keydown', e => { if (e.code === 'Space') input.boost = true; });
window.addEventListener('keyup',   e => { if (e.code === 'Space') input.boost = false; });

// ============================================================
// HELPERS
// ============================================================
const rand = (a, b) => a + Math.random() * (b - a);
const randi = (a, b) => Math.floor(rand(a, b));
const dist2 = (ax, ay, bx, by) => { const dx = ax-bx, dy = ay-by; return dx*dx + dy*dy; };
const TAU = Math.PI * 2;
function angleDiff(a, b) {
  let d = b - a;
  while (d > Math.PI) d -= TAU;
  while (d < -Math.PI) d += TAU;
  return d;
}

const CRYSTAL_COLORS = [
  { hue: 195, glow: '#7ed7ff' },
  { hue: 280, glow: '#c89bff' },
  { hue: 330, glow: '#ff9bd1' },
  { hue: 50,  glow: '#ffe07a' },
  { hue: 140, glow: '#7affc4' },
];

const SNAKE_PALETTES = [
  ['#ff6b9d', '#ffd166'],
  ['#4cd4ff', '#a18cff'],
  ['#7affc4', '#ffe07a'],
  ['#ff9bd1', '#c89bff'],
  ['#ffaa55', '#ff5577'],
  ['#7ed7ff', '#5cffd1'],
];

const AI_NAMES = ['Naga', 'Viper', 'Cobra', 'Mamba', 'Python', 'Serpente', 'Anaconda', 'Boa', 'Wyrm', 'Hydra'];

// ============================================================
// CRYSTAL ENGINE
// ============================================================
const CRYSTAL_SPRITE_R = 10;
const CRYSTAL_GLOW_HALF = CRYSTAL_SPRITE_R * 4;
const CRYSTAL_CORE_HALF = 13;
const CRYSTAL_CAP = 1000;
const CRYSTAL_NOGLOW_THRESHOLD = 400;

const _crystalSpriteCache = new Map();

function makeCrystalSprite(hue, glow, withGlow) {
  const half = withGlow ? CRYSTAL_GLOW_HALF : CRYSTAL_CORE_HALF;
  const size = half * 2;
  const cnv = document.createElement('canvas');
  cnv.width = size; cnv.height = size;
  const c = cnv.getContext('2d');
  const cx = half, cy = half;
  const r = CRYSTAL_SPRITE_R;

  if (withGlow) {
    const g = c.createRadialGradient(cx, cy, 0, cx, cy, r * 4);
    g.addColorStop(0, glow + 'cc');
    g.addColorStop(0.4, glow + '33');
    g.addColorStop(1, 'transparent');
    c.fillStyle = g;
    c.beginPath(); c.arc(cx, cy, r * 4, 0, TAU); c.fill();
  }

  c.fillStyle = `hsl(${hue}, 90%, 65%)`;
  c.strokeStyle = '#ffffff';
  c.lineWidth = 1;
  c.beginPath();
  c.moveTo(cx, cy - r);
  c.lineTo(cx + r * 0.7, cy);
  c.lineTo(cx, cy + r);
  c.lineTo(cx - r * 0.7, cy);
  c.closePath();
  c.fill();
  c.stroke();

  return cnv;
}

function getCrystalSprites(hue, glow) {
  const key = hue + '|' + glow;
  let entry = _crystalSpriteCache.get(key);
  if (!entry) {
    entry = {
      sprite:     makeCrystalSprite(hue, glow, true),
      spriteCore: makeCrystalSprite(hue, glow, false),
    };
    _crystalSpriteCache.set(key, entry);
  }
  return entry;
}

function ensureCrystalSprites(color) {
  if (color.sprite) return;
  const entry = getCrystalSprites(color.hue, color.glow);
  color.sprite = entry.sprite;
  color.spriteCore = entry.spriteCore;
}

let _crystalT = 0;
let _crystalSpriteKey = 'sprite';
let _crystalSpriteHalf = CRYSTAL_GLOW_HALF;

class Crystal {
  constructor(x, y, value = 1, color = null) {
    this.x = x; this.y = y;
    this.value = value;
    this.color = color || CRYSTAL_COLORS[randi(0, CRYSTAL_COLORS.length)];
    ensureCrystalSprites(this.color);
    this.radius = 4 + Math.sqrt(value) * 1.6;
    this.phase = Math.random() * TAU;
  }
  draw(cam) {
    const half = _crystalSpriteHalf;
    const sx = this.x - cam.x, sy = this.y - cam.y;
    if (sx < -half || sy < -half || sx > W+half || sy > H+half) return;
    const t = _crystalT;
    const r = this.radius * (1 + 0.1 * Math.sin(t * 3 + this.phase));
    const scale = r / CRYSTAL_SPRITE_R;
    const ang = t * 0.6 + this.phase;
    const cs = Math.cos(ang) * scale;
    const sn = Math.sin(ang) * scale;
    ctx.setTransform(cs, sn, -sn, cs, sx, sy);
    ctx.drawImage(this.color[_crystalSpriteKey], -half, -half);
  }
}

function drawCrystals(cam) {
  _crystalT = performance.now() * 0.003;
  const noGlow = world.crystals.length > CRYSTAL_NOGLOW_THRESHOLD;
  _crystalSpriteKey  = noGlow ? 'spriteCore' : 'sprite';
  _crystalSpriteHalf = noGlow ? CRYSTAL_CORE_HALF : CRYSTAL_GLOW_HALF;
  for (const c of world.crystals) c.draw(cam);
  ctx.setTransform(1, 0, 0, 1, 0, 0);
}

// ============================================================
// SNAKE ENGINE
// ============================================================
class Snake {
  constructor(opts = {}) {
    this.x = opts.x ?? rand(200, WORLD - 200);
    this.y = opts.y ?? rand(200, WORLD - 200);
    this.angle = rand(0, TAU);
    this.targetAngle = this.angle;
    this.speed = BASE_SPEED;
    this.boost = false;
    this.length = opts.length ?? START_LENGTH;
    this.segments = [];
    for (let i = 0; i < this.length; i++) {
      this.segments.push({ x: this.x - Math.cos(this.angle) * i * SEG_SPACING, y: this.y - Math.sin(this.angle) * i * SEG_SPACING });
    }
    this.isPlayer = !!opts.isPlayer;
    this.palette = opts.palette || SNAKE_PALETTES[randi(0, SNAKE_PALETTES.length)];
    this.name = opts.name || AI_NAMES[randi(0, AI_NAMES.length)];
    this.alive = true;
    this.aiTimer = 0;
    this.aiTargetCrystal = null;
    this.eaten = 0;
    this.boostFuel = 0;
    this.bbox = { minX: this.x - 50, minY: this.y - 50, maxX: this.x + 50, maxY: this.y + 50 };
  }
  get radius() { return HEAD_RADIUS + Math.min(10, this.length * 0.04); }
  
  update(dt, world) {
    if (!this.alive) return;

    if (this.isPlayer) {
      // Segue a coordenada do touch na tela convertida para o mundo global
      const wx = input.mx + world.camera.x;
      const wy = input.my + world.camera.y;
      
      // Só atualiza a direção se o toque não for exatamente em cima da cabeça da cobra (evita trepidação)
      if(dist2(this.x, this.y, wx, wy) > 150) {
         this.targetAngle = Math.atan2(wy - this.y, wx - this.x);
      }
      this.boost = input.boost && this.length > START_LENGTH;
    } else {
      this.updateAI(world);
    }

    const diff = angleDiff(this.angle, this.targetAngle);
    const maxTurn = TURN_RATE * (this.boost ? 0.8 : 1);
    this.angle += Math.max(-maxTurn, Math.min(maxTurn, diff));
    this.speed = this.boost ? DASH_SPEED : BASE_SPEED;

    this.x += Math.cos(this.angle) * this.speed;
    this.y += Math.sin(this.angle) * this.speed;

    const margin = 40;
    if (this.x < margin) { this.x = margin; this.targetAngle = 0; }
    if (this.x > WORLD - margin) { this.x = WORLD - margin; this.targetAngle = Math.PI; }
    if (this.y < margin) { this.y = margin; this.targetAngle = Math.PI / 2; }
    if (this.y > WORLD - margin) { this.y = WORLD - margin; this.targetAngle = -Math.PI / 2; }

    this.segments[0].x = this.x;
    this.segments[0].y = this.y;
    for (let i = 1; i < this.segments.length; i++) {
      const prev = this.segments[i-1];
      const seg = this.segments[i];
      const dx = prev.x - seg.x, dy = prev.y - seg.y;
      const d = Math.hypot(dx, dy);
      if (d > SEG_SPACING) {
        const t = (d - SEG_SPACING) / d;
        seg.x += dx * t; seg.y += dy * t;
      }
    }

    if (this.boost) {
      this.boostFuel += dt;
      if (this.boostFuel > 0.20 && this.length > START_LENGTH) {
        this.boostFuel = 0;
        const tail = this.segments[this.segments.length - 1];
        world.crystals.push(new Crystal(tail.x + rand(-6,6), tail.y + rand(-6,6), 1));
        this.length -= 1;
        while (this.segments.length > this.length) this.segments.pop();
      }
    }
  }

  updateAI(world) {
    this.aiTimer -= 1;
    if (this.aiTimer <= 0 || !this.aiTargetCrystal) {
      this.aiTimer = randi(60, 150);
      let best = null, bestD = Infinity;
      for (let i = 0; i < 20; i++) {
        const c = world.crystals[randi(0, world.crystals.length)];
        if (!c) continue;
        const d = dist2(this.x, this.y, c.x, c.y);
        if (d < bestD) { bestD = d; best = c; }
      }
      this.aiTargetCrystal = best;
    }

    let desired = this.angle;
    if (this.aiTargetCrystal) {
      desired = Math.atan2(this.aiTargetCrystal.y - this.y, this.aiTargetCrystal.x - this.x);
    }

    // Desvio de obstáculos simples
    const lookX = this.x + Math.cos(this.angle) * 70;
    const lookY = this.y + Math.sin(this.angle) * 70;
    let danger = null, dangerD = Infinity;
    for (const s of world.snakes) {
      if (s === this || !s.alive) continue;
      if (lookX < s.bbox.minX || lookX > s.bbox.maxX || lookY < s.bbox.minY || lookY > s.bbox.maxY) continue;
      for (let i = 0; i < s.segments.length; i += 4) {
        const seg = s.segments[i];
        const d = dist2(lookX, lookY, seg.x, seg.y);
        if (d < 3600 && d < dangerD) { dangerD = d; danger = seg; }
      }
    }
    if (danger) {
      desired = Math.atan2(this.y - danger.y, this.x - danger.x) + rand(-0.3, 0.3);
    }

    const wallMargin = 200;
    if (this.x < wallMargin) desired = 0;
    else if (this.x > WORLD - wallMargin) desired = Math.PI;
    else if (this.y < wallMargin) desired = Math.PI/2;
    else if (this.y > WORLD - wallMargin) desired = -Math.PI/2;

    this.targetAngle = desired;
  }

  eat(crystal) {
    this.length += crystal.value;
    this.eaten += crystal.value;
    const tail = this.segments[this.segments.length - 1];
    for (let i = 0; i < crystal.value; i++) {
      this.segments.push({ x: tail.x, y: tail.y });
    }
  }

  die(world) {
    if (!this.alive) return;
    this.alive = false;
    const stride = 4;
    const value = 2 * stride;
    const hex = this.palette[0];
    const r = parseInt(hex.slice(1,3),16)/255, g = parseInt(hex.slice(3,5),16)/255, b = parseInt(hex.slice(5,7),16)/255;
    const max = Math.max(r,g,b), min = Math.min(r,g,b);
    let h = 0;
    if (max !== min) {
      if (max === r) h = ((g-b)/(max-min)) % 6;
      else if (max === g) h = (b-r)/(max-min) + 2;
      else h = (r-g)/(max-min) + 4;
    }
    h = h * 60; if (h < 0) h += 360;

    for (let i = 0; i < this.segments.length; i += stride) {
      const seg = this.segments[i];
      world.crystals.push(new Crystal(seg.x + rand(-12, 12), seg.y + rand(-12, 12), value, { hue: h, glow: hex }));
    }
  }

  draw(cam) {
    if (!this.alive) return;
    const r = this.radius;
    for (let i = this.segments.length - 1; i >= 0; i--) {
      const s = this.segments[i];
      const sx = s.x - cam.x, sy = s.y - cam.y;
      if (sx < -40 || sy < -40 || sx > W+40 || sy > H+40) continue;

      const t = i / this.segments.length;
      const segR = r * (1 - t * 0.25);
      const c1 = this.palette[0], c2 = this.palette[1];

      if (this.boost && i === 0) {
        const g = ctx.createRadialGradient(sx, sy, 0, sx, sy, segR * 2.5);
        g.addColorStop(0, c1 + '55'); g.addColorStop(1, 'transparent');
        ctx.fillStyle = g; ctx.beginPath(); ctx.arc(sx, sy, segR * 2.5, 0, TAU); ctx.fill();
      }

      const grad = ctx.createRadialGradient(sx - segR*0.3, sy - segR*0.3, segR*0.2, sx, sy, segR);
      grad.addColorStop(0, c2); grad.addColorStop(1, c1);
      ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(sx, sy, segR, 0, TAU); ctx.fill();
    }

    // Olhos
    const head = this.segments[0];
    const sx = head.x - cam.x, sy = head.y - cam.y;
    const eyeOff = r * 0.45;
    for (const a of [this.angle - 0.6, this.angle + 0.6]) {
      const ex = sx + Math.cos(a) * eyeOff, ey = sy + Math.sin(a) * eyeOff;
      ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(ex, ey, r * 0.28, 0, TAU); ctx.fill();
      ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(ex + Math.cos(this.angle)*r*0.1, ey + Math.sin(this.angle)*r*0.1, r * 0.14, 0, TAU); ctx.fill();
    }

    if (!this.isPlayer) {
      ctx.font = '10px Segoe UI, Arial'; ctx.textAlign = 'center'; ctx.fillStyle = 'rgba(255,255,255,0.6)';
      ctx.fillText(this.name, sx, sy - r - 6);
    }
  }
}

// ============================================================
// GERENCIADOR DO MUNDO
// ============================================================
const world = { crystals: [], snakes: [], player: null, camera: { x: 0, y: 0 } };

function spawnCrystals(n) {
  for (let i = 0; i < n; i++) world.crystals.push(new Crystal(rand(50, WORLD-50), rand(50, WORLD-50), 1));
}

function spawnAI(n) {
  for (let i = 0; i < n; i++) {
    world.snakes.push(new Snake({
      x: rand(200, WORLD - 200), y: rand(200, WORLD - 200),
      length: randi(15, 45), palette: SNAKE_PALETTES[randi(0, SNAKE_PALETTES.length)],
      name: AI_NAMES[randi(0, AI_NAMES.length)] + ' ' + randi(1,99)
    }));
  }
}

function startGame() {
  world.crystals = []; world.snakes = [];
  spawnCrystals(CRYSTAL_COUNT);
  world.player = new Snake({
    x: WORLD/2, y: WORLD/2, length: START_LENGTH,
    palette: ['#ffe07a', '#ff8855'], name: 'Você', isPlayer: true
  });
  world.snakes.push(world.player);
  spawnAI(AI_COUNT);
  document.getElementById('overlay').classList.add('hidden');
  lastTime = performance.now();
  requestAnimationFrame(loop);
}

function respawnAI() {
  const aliveAI = world.snakes.filter(s => s.alive && !s.isPlayer).length;
  if (aliveAI < AI_COUNT) {
    world.snakes.push(new Snake({
      x: rand(200, WORLD - 200), y: rand(200, WORLD - 200), length: randi(15, 35)
    }));
  }
}

function handleCollisions() {
  for (const s of world.snakes) {
    if (!s.alive) continue;
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    for (let i = 0; i < s.segments.length; i++) {
      const seg = s.segments[i];
      if (seg.x < minX) minX = seg.x; if (seg.x > maxX) maxX = seg.x;
      if (seg.y < minY) minY = seg.y; if (seg.y > maxY) maxY = seg.y;
    }
    const pad = s.radius + 4;
    s.bbox.minX = minX - pad; s.bbox.maxX = maxX + pad;
    s.bbox.minY = minY - pad; s.bbox.maxY = maxY + pad;
  }

  // Pegar cristais
  for (const snake of world.snakes) {
    if (!snake.alive) continue;
    const hr = snake.radius;
    for (let i = world.crystals.length - 1; i >= 0; i--) {
      const c = world.crystals[i];
      if (Math.abs(c.x - snake.x) < 40 && Math.abs(c.y - snake.y) < 40) {
        if (dist2(c.x, c.y, snake.x, snake.y) < (hr + c.radius) * (hr + c.radius)) {
          snake.eat(c); world.crystals.splice(i, 1);
        }
      }
    }
  }

  // Bater corpo a corpo
  for (const a of world.snakes) {
    if (!a.alive) continue;
    for (const b of world.snakes) {
      if (a === b || !b.alive) continue;
      if (a.x >= b.bbox.minX && a.x <= b.bbox.maxX && a.y >= b.bbox.minY && a.y <= b.bbox.maxY) {
        const len = b.segments.length;
        for (let i = 2; i < len; i += 2) {
          const seg = b.segments[i];
          if (dist2(seg.x, seg.y, a.x, a.y) < (a.radius + b.radius*0.8) * (a.radius + b.radius*0.8)) {
            a.die(world); break;
          }
        }
        if (!a.alive) break;
      }
    }
  }
  world.snakes = world.snakes.filter(s => s.alive || s.isPlayer);
  if (world.crystals.length > CRYSTAL_CAP) world.crystals.splice(0, world.crystals.length - CRYSTAL_CAP);
}

// ============================================================
// RENDERS & HUDs
// ============================================================
function drawBackground() {
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#0a0f24'); g.addColorStop(1, '#1a0a2e');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);

  const cam = world.camera; const grid = 80;
  ctx.strokeStyle = 'rgba(120, 180, 255, 0.05)'; ctx.lineWidth = 1;
  ctx.beginPath();
  for (let x = -cam.x % grid; x < W; x += grid) { ctx.moveTo(x, 0); ctx.lineTo(x, H); }
  for (let y = -cam.y % grid; y < H; y += grid) { ctx.moveTo(0, y); ctx.lineTo(W, y); }
  ctx.stroke();

  ctx.strokeStyle = 'rgba(255, 120, 180, 0.4)'; ctx.lineWidth = 4;
  ctx.strokeRect(-cam.x, -cam.y, WORLD, WORLD);
}

function drawMinimap() {
  const size = mini.width; mctx.clearRect(0, 0, size, size);
  mctx.fillStyle = 'rgba(10, 14, 30, 0.6)'; mctx.fillRect(0, 0, size, size);
  const sc = size / WORLD;

  mctx.fillStyle = 'rgba(120, 200, 255, 0.3)';
  for (let i = 0; i < world.crystals.length; i += 6) {
    mctx.fillRect(world.crystals[i].x * sc, world.crystals[i].y * sc, 1, 1);
  }
  for (const s of world.snakes) {
    if (!s.alive) continue;
    mctx.fillStyle = s.isPlayer ? '#ffe07a' : s.palette[0];
    mctx.beginPath(); mctx.arc(s.x * sc, s.y * sc, s.isPlayer ? 3 : 2, 0, TAU); mctx.fill();
  }
}

function updateHUD() {
  document.getElementById('score').textContent = world.player.alive ? world.player.length : '—';
  document.getElementById('eaten').textContent = world.player.eaten;
  document.getElementById('alive').textContent = world.snakes.filter(s => s.alive).length;

  const top = world.snakes.filter(s => s.alive).sort((a,b) => b.length - a.length).slice(0, 5);
  document.getElementById('leaderboardList').innerHTML = top.map((s, i) =>
    `<div class="row ${s.isPlayer ? 'me' : ''}"><span>${i+1}. ${s.name.substring(0,8)}</span><span>${s.length}</span></div>`
  ).join('');
}

let smoothedFps = 60, perfLastUpdate = 0;
function updatePerfMeter(dt, now) {
  if (dt > 0) smoothedFps = smoothedFps * 0.95 + (1 / dt) * 0.05;
  if (now - perfLastUpdate < 500) return;
  perfLastUpdate = now;
  document.getElementById('fps').textContent = Math.round(smoothedFps);
  if (performance.memory) {
    document.getElementById('memory').textContent = Math.round(performance.memory.usedJSHeapSize / 1048576) + 'MB';
  }
}

// ============================================================
// LOOP PRINCIPAL
// ============================================================
let lastTime = 0;
function loop(now) {
  const dt = Math.min(0.05, (now - lastTime) / 1000);
  lastTime = now;

  for (const s of world.snakes) s.update(dt, world);
  handleCollisions();
  respawnAI();

  if (world.player) {
    world.camera.x = world.player.x - W / 2;
    world.camera.y = world.player.y - H / 2;
  }

  drawBackground();
  drawCrystals(world.camera);
  for (const s of world.snakes) if (!s.isPlayer) s.draw(world.camera);
  if (world.player) world.player.draw(world.camera);

  drawMinimap();
  updateHUD();
  updatePerfMeter(dt, now);

  if (world.player && !world.player.alive) {
    showGameOver(); return;
  }
  requestAnimationFrame(loop);
}

function showGameOver() {
  const overlay = document.getElementById('overlay');
  overlay.classList.remove('hidden');
  overlay.querySelector('.panel').innerHTML = `
    <h1>Fim de Jogo!</h1>
    <p>Sua cobra chegou ao tamanho de <b>${world.player.length}</b> pontos.<br>Destrua as rivais cercando suas cabeças!</p>
    <button id="startBtn">Jogar de Novo</button>
  `;
  document.getElementById('startBtn').addEventListener('click', startGame);
}

document.getElementById('startBtn').addEventListener('click', startGame);
</script>
