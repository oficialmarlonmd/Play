<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Estilingue Gravitacional</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; }
  
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #0b0c10; /* Fundo do espaço */
    font-family: 'Segoe UI', Arial, sans-serif;
    color: #fff;
    touch-action: none; /* Bloqueia gestos nativos (zoom/scroll) */
  }
  
  canvas { display: block; }
  
  #ui {
    position: fixed; top: 20px; left: 20px;
    pointer-events: none; text-shadow: 0 0 10px rgba(0,255,255,0.5);
  }
  
  h1 { font-size: 20px; color: #66fcf1; }
  p { font-size: 14px; color: #c5c6c7; margin-top: 5px; }
  
  #overlay {
    position: fixed; inset: 0;
    background: rgba(11, 12, 16, 0.85);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; z-index: 10; backdrop-filter: blur(5px);
  }
  
  .hidden { display: none !important; }
  
  .panel {
    background: #1f2833; border: 2px solid #45a29e;
    padding: 30px; border-radius: 12px; text-align: center;
    box-shadow: 0 0 20px rgba(69, 162, 158, 0.4); max-width: 90%;
  }
  
  button {
    margin-top: 20px; padding: 12px 24px;
    background: #45a29e; color: #0b0c10;
    border: none; border-radius: 6px;
    font-size: 16px; font-weight: bold; cursor: pointer;
    transition: transform 0.1s, background 0.2s;
  }
  button:hover { background: #66fcf1; transform: scale(1.05); }
  button:active { transform: scale(0.95); }
</style>
</head>
<body>

<div id="ui">
  <h1>Estilingue Gravitacional</h1>
  <p>Arraste em QUALQUER LUGAR da tela para lançar.</p>
  <p id="status">Status: Preparando</p>
</div>

<canvas id="game"></canvas>

<div id="overlay">
  <div class="panel">
    <h2 id="msgTitle">Missão Espacial</h2>
    <p id="msgDesc">Use a gravidade dos planetas para curvar sua trajetória até o portal verde. Evite colidir com os planetas e não saia da tela.</p>
    <button id="btnAction">Lançar Sonda</button>
  </div>
</div>

<script>
// ==========================================
// CONFIGURAÇÃO DO CANVAS E JANELA
// ==========================================
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// ==========================================
// VARIÁVEIS E CONSTANTES FÍSICAS
// ==========================================
const G = 0.5; // Constante gravitacional do jogo
let gameState = 'MENU'; // MENU, AIMING, FLYING, GAMEOVER, WIN
let level = 1;

let probe;
let planets = [];
let goal;

// Controles de Arraste (Touch "Anywhere")
let dragStart = null;
let dragCurrent = null;
const MAX_DRAG = 200; // Limite máximo da força do estilingue
const POWER_MULTIPLIER = 0.05;

// ==========================================
// CLASSES
// ==========================================
class Probe {
  constructor(x, y) {
    this.x = x; this.y = y;
    this.vx = 0; this.vy = 0;
    this.radius = 6;
    this.color = '#ffffff';
    this.trail = [];
  }

  update() {
    if (gameState !== 'FLYING') return;

    // Rastro da nave
    this.trail.push({ x: this.x, y: this.y });
    if (this.trail.length > 50) this.trail.shift();

    // Aplica a gravidade de todos os planetas (Fórmula base de Newton)
    for (let p of planets) {
      let dx = p.x - this.x;
      let dy = p.y - this.y;
      let distSq = dx*dx + dy*dy;
      let dist = Math.sqrt(distSq);

      // Evita divisão por zero bizarra se estiver dentro do planeta
      if (dist < 1) continue;

      // Aceleração = G * MassaDoPlaneta / dist^2
      let force = (G * p.mass) / distSq;
      
      // Decompõe a força nos eixos X e Y
      this.vx += (dx / dist) * force;
      this.vy += (dy / dist) * force;
    }

    // Move a nave
    this.x += this.vx;
    this.y += this.vy;
  }

  draw(ctx) {
    // Desenha rastro
    if (this.trail.length > 0) {
      ctx.beginPath();
      ctx.moveTo(this.trail[0].x, this.trail[0].y);
      for (let i = 1; i < this.trail.length; i++) {
        ctx.lineTo(this.trail[i].x, this.trail[i].y);
      }
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    // Desenha Nave
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
    ctx.fillStyle = this.color;
    ctx.fill();
    ctx.shadowBlur = 10;
    ctx.shadowColor = this.color;
  }
}

class Planet {
  constructor(x, y, radius, color) {
    this.x = x; this.y = y;
    this.radius = radius;
    // A massa do planeta é proporcional à área visual dele (pi * r^2)
    this.mass = radius * radius * 0.8; 
    this.color = color;
  }

  draw(ctx) {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
    
    // Gradiente para dar volume
    let grad = ctx.createRadialGradient(this.x - this.radius*0.3, this.y - this.radius*0.3, this.radius*0.1, this.x, this.y, this.radius);
    grad.addColorStop(0, '#fff');
    grad.addColorStop(1, this.color);
    
    ctx.fillStyle = grad;
    ctx.shadowBlur = 20;
    ctx.shadowColor = this.color;
    ctx.fill();
    ctx.shadowBlur = 0; // reseta
  }
}

class Goal {
  constructor(x, y, radius) {
    this.x = x; this.y = y;
    this.radius = radius;
    this.color = '#66fcf1';
    this.pulse = 0;
  }

  draw(ctx) {
    this.pulse += 0.05;
    let currentRadius = this.radius + Math.sin(this.pulse) * 4;

    ctx.beginPath();
    ctx.arc(this.x, this.y, currentRadius, 0, Math.PI * 2);
    ctx.strokeStyle = this.color;
    ctx.lineWidth = 3;
    ctx.shadowBlur = 15;
    ctx.shadowColor = this.color;
    ctx.stroke();
    ctx.shadowBlur = 0;
  }
}

// ==========================================
// CONTROLES INPUT (TOUCH / MOUSE)
// ==========================================
function getPointerPos(e) {
  if (e.touches && e.touches.length > 0) {
    return { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }
  return { x: e.clientX, y: e.clientY };
}

function handleStart(e) {
  if (gameState !== 'AIMING') return;
  dragStart = getPointerPos(e);
  dragCurrent = { x: dragStart.x, y: dragStart.y };
}

function handleMove(e) {
  if (gameState !== 'AIMING' || !dragStart) return;
  dragCurrent = getPointerPos(e);
}

function handleEnd(e) {
  if (gameState !== 'AIMING' || !dragStart) return;
  
  let dx = dragStart.x - dragCurrent.x;
  let dy = dragStart.y - dragCurrent.y;
  
  // Limita o tamanho do vetor de força
  let dist = Math.sqrt(dx*dx + dy*dy);
  if (dist > MAX_DRAG) {
    dx = (dx / dist) * MAX_DRAG;
    dy = (dy / dist) * MAX_DRAG;
  }
  
  // Só lança se o jogador puxou o mínimo
  if (dist > 10) {
    probe.vx = dx * POWER_MULTIPLIER;
    probe.vy = dy * POWER_MULTIPLIER;
    gameState = 'FLYING';
    document.getElementById('status').textContent = 'Status: Em voo (Aguarde)';
  }
  
  dragStart = null;
  dragCurrent = null;
}

// Eventos Mobile
window.addEventListener('touchstart', handleStart, { passive: false });
window.addEventListener('touchmove', handleMove, { passive: false });
window.addEventListener('touchend', handleEnd, { passive: false });

// Eventos PC
window.addEventListener('mousedown', handleStart);
window.addEventListener('mousemove', handleMove);
window.addEventListener('mouseup', handleEnd);

// ==========================================
// LÓGICA DO JOGO E LOOP PRINCIPAL
// ==========================================
function loadLevel() {
  planets = [];
  
  // Define o centro da tela
  const cx = W / 2;
  const cy = H / 2;

  if (level === 1) {
    // Nível 1: O Básico (Um planeta no caminho)
    probe = new Probe(50, cy);
    goal = new Goal(W - 80, cy, 30);
    planets.push(new Planet(cx, cy, 60, '#c3073f')); 
    
  } else if (level === 2) {
    // Nível 2: Curva Dupla
    probe = new Probe(50, cy - 100);
    goal = new Goal(W - 80, cy + 100, 30);
    planets.push(new Planet(cx - 100, cy - 100, 40, '#c3073f'));
    planets.push(new Planet(cx + 100, cy + 100, 50, '#ff9a00'));
    
  } else if (level === 3) {
    // Nível 3: O Corredor Polonês (Vários planetas em zigue-zague)
    probe = new Probe(50, cy);
    goal = new Goal(W - 80, cy, 30);
    planets.push(new Planet(cx - 150, cy + 100, 45, '#4caf50'));
    planets.push(new Planet(cx, cy - 100, 45, '#2196f3'));
    planets.push(new Planet(cx + 150, cy + 100, 45, '#9c27b0'));
    
  } else if (level === 4) {
    // Nível 4: A Anomalia (Um Buraco Negro pequeno mas super pesado)
    probe = new Probe(50, H - 100);
    goal = new Goal(W - 80, 100, 30);
    
    let blackHole = new Planet(cx, cy, 25, '#333');
    // Hackeando a física: sobreescrevemos a massa dele para ser absurdamente forte
    blackHole.mass = 8000; 
    planets.push(blackHole);
    
    planets.push(new Planet(cx - 150, cy + 150, 40, '#ff5722'));
    
  } else if (level === 5) {
    // Nível 5: O Muro (Acerte o buraco da agulha)
    probe = new Probe(50, cy);
    goal = new Goal(W - 80, cy, 30);
    
    // Três planetas formando uma barreira, com uma fresta
    planets.push(new Planet(cx, cy - 200, 60, '#e91e63'));
    planets.push(new Planet(cx, cy - 70, 60, '#e91e63'));
    // Fresta para passar no meio...
    planets.push(new Planet(cx, cy + 150, 80, '#e91e63'));
  }
  
  gameState = 'AIMING';
  document.getElementById('status').textContent = `Nível ${level} | Mire e solte (Arraste em qualquer lugar)`;
  document.getElementById('overlay').classList.add('hidden');
}

function checkCollisions() {
  if (gameState !== 'FLYING') return;

  // Saiu da tela
  if (probe.x < -100 || probe.x > W + 100 || probe.y < -100 || probe.y > H + 100) {
    showOverlay('Nave Perdida no Espaço', 'Sua sonda vagou para o vazio infinito.', 'Tentar Novamente');
    return;
  }

  // Bateu num planeta
  for (let p of planets) {
    let dist = Math.hypot(probe.x - p.x, probe.y - p.y);
    if (dist < p.radius + probe.radius) {
      showOverlay('Impacto Destrutivo', 'Sua nave foi esmagada pela gravidade e chocou-se contra a superfície.', 'Tentar Novamente');
      return;
    }
  }

  // Chegou no portal
  let distGoal = Math.hypot(probe.x - goal.x, probe.y - goal.y);
  if (distGoal < goal.radius) {
    let maxLevel = 5; 
    
    if (level < maxLevel) {
      level++;
      showOverlay('Sucesso!', `Preparando Nível ${level}...`, 'Próxima Fase');
    } else {
      level = 1; // Reseta o jogo ao zerar
      showOverlay('Vitória Absoluta!', 'Você dominou a mecânica do estilingue espacial e zerou o jogo!', 'Jogar Novamente');
    }
    return;
  }
}

function showOverlay(title, desc, btnText) {
  gameState = 'GAMEOVER';
  document.getElementById('status').textContent = 'Status: Missão Interrompida';
  document.getElementById('msgTitle').textContent = title;
  document.getElementById('msgDesc').textContent = desc;
  document.getElementById('btnAction').textContent = btnText;
  document.getElementById('overlay').classList.remove('hidden');
}

document.getElementById('btnAction').addEventListener('click', loadLevel);

function drawAimLine() {
  if (gameState === 'AIMING' && dragStart && dragCurrent) {
    let dx = dragStart.x - dragCurrent.x;
    let dy = dragStart.y - dragCurrent.y;
    
    // Limita o visual
    let dist = Math.sqrt(dx*dx + dy*dy);
    if (dist > MAX_DRAG) {
      dx = (dx / dist) * MAX_DRAG;
      dy = (dy / dist) * MAX_DRAG;
    }

    if (dist > 10) {
      // Linha saindo da nave indicando a direção e força
      ctx.beginPath();
      ctx.moveTo(probe.x, probe.y);
      ctx.lineTo(probe.x + dx * 1.5, probe.y + dy * 1.5);
      
      // Efeito de linha pontilhada da UI
      ctx.setLineDash([5, 10]);
      ctx.strokeStyle = '#66fcf1';
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.setLineDash([]); // Restaura
    }
  }
}

function drawBackground() {
  ctx.clearRect(0, 0, W, H);
  
  // Estrelas simples de fundo (estáticas)
  ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
  for(let i=0; i<50; i++) {
    // Usando uma semente pseudo-aleatória barata baseada no tamanho da tela
    let sx = (i * 73) % W;
    let sy = (i * 127) % H;
    ctx.fillRect(sx, sy, 1, 1);
  }
}

function loop() {
  drawBackground();
  
  if (probe) {
    probe.update();
    checkCollisions();
  }

  // Renderiza objetos
  if (goal) goal.draw(ctx);
  for (let p of planets) p.draw(ctx);
  if (probe) probe.draw(ctx);
  
  // Linha de mira
  drawAimLine();

  requestAnimationFrame(loop);
}

// Inicia
requestAnimationFrame(loop);

</script>
</body>
</html>
